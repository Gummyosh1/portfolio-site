<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css-riftbound/style.css">

    <title>Connor's Riftbound Inventory</title>
</head>
<body>
    <div class="">
        <div class="container hero">
            <div class="row d-flex align-items-center justify-content-center pt-5">
                <div class="col-12">
                    <h1 class="text-center share-tech-regular">Connor's Riftbound Inventory</h1>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row d-flex align-items-center justify-content-center pt-3">
                <div class="btn-group flex-wrap col-auto" role="group" aria-label="Card type filters" id="typeFilters">
                    <input type="radio" class="btn-check" name="cardType" id="allBtn" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="allBtn" data-type="all">All</label>

                    <input type="radio" class="btn-check" name="cardType" id="unitBtn" autocomplete="off">
                    <label class="btn btn-outline-primary" for="unitBtn" data-type="unit">Units</label>

                    <input type="radio" class="btn-check" name="cardType" id="spellBtn" autocomplete="off">
                    <label class="btn btn-outline-primary" for="spellBtn" data-type="spell">Spells</label>

                    <input type="radio" class="btn-check" name="cardType" id="legendBtn" autocomplete="off">
                    <label class="btn btn-outline-primary" for="legendBtn" data-type="legend">Legends</label>

                    <input type="radio" class="btn-check" name="cardType" id="championBtn" autocomplete="off">
                    <label class="btn btn-outline-primary" for="championBtn" data-type="champion">Champion Units</label>

                    <input type="radio" class="btn-check" name="cardType" id="gearBtn" autocomplete="off">
                    <label class="btn btn-outline-primary" for="gearBtn" data-type="gear">Gear</label>

                    <input type="radio" class="btn-check" name="cardType" id="battlefieldBtn" autocomplete="off">
                    <label class="btn btn-outline-primary" for="battlefieldBtn" data-type="battlefield">Battlefields</label>
                </div>
            </div>
        </div>

        <div class="container text-center mt-3">
            <h6 id="totalCardCount" class="share-tech-regular-v2">Total Cards: 0</h6>
            <p id="contentVersion" class="small text-muted mb-0"></p>
        </div>

        <div class="container text-center">
            <input class="form-control w-75 mx-auto searchBar" type="search" placeholder="Search by card name, set, number, type, faction, rarity, or keyword">
        </div>

        <div class="container text-center mt-2">
            <button id="refreshButton" class="btn btn-primary button-special">Refresh Riot Data</button>
        </div>

        <div id="statusMessage" class="container text-center mt-3 small text-muted">
            Loading inventory...
        </div>

        <div id="cardList" class="container pt-5">
            <div id="cardRow" class="row justify-content-center g-4"></div>
        </div>
        <p id="noResults" class="text-center mt-4" style="display: none;">No results found.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js-riftbound/script.js"></script>
</body>
</html>
